name: OpenSSF Scorecard

# OSSF Scorecard scores the repo on 18 supply-chain-security criteria
# (branch protection, signed commits, pinned dependencies, SAST, etc.)
# and publishes the results to the public Scorecard dashboard.  Passing
# a high score is a credibility signal for any federal consumer.
#
# Docs: https://github.com/ossf/scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1"   # weekly Monday 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF for GitHub code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
          category: ossf-scorecard

      - name: Upload raw results artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 30
