name: Deploy to Hugging Face Space

# Mirrors the GitHub main branch into the HF Space git on every push.
# Needed because HF's native GitHub auto-sync silently dropped (the
# Space's `linkedRepo` field went null, and syncs stopped after commit
# 29d8b01).  This workflow removes the dependency on that link by
# force-pushing from GitHub Actions using HF_TOKEN.
#
# Secret required:
#   HF_TOKEN  — write-access HF user access token.  Set via
#               `gh secret set HF_TOKEN -R consigcody94/asos-tools-py`.
#
# Variable used (optional — defaults baked in if unset):
#   HF_SPACE_USER  — HF namespace (default: consgicody)
#   HF_SPACE_NAME  — space slug    (default: asos-tools)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    name: Force-push main to HF Space
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_USER: ${{ vars.HF_SPACE_USER || 'consgicody' }}
          HF_SPACE_NAME: ${{ vars.HF_SPACE_NAME || 'asos-tools' }}
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN:-}" ]; then
            echo "::error::HF_TOKEN secret is not set — cannot mirror."
            echo "Set one with: gh secret set HF_TOKEN -R ${GITHUB_REPOSITORY}"
            exit 1
          fi

          python -m pip install --quiet "huggingface_hub>=0.27"

          # HF Space deploys via the REST API, not git.  HF's git server
          # rejects write-role tokens with "Invalid username or password"
          # (apparent quirk with the LFS gateway), but the same token
          # works fine for REST.  upload_folder() sends a single commit
          # with every tracked file; ignore_patterns excludes local dev
          # artifacts that shouldn't ship to the Space.
          python <<'PY'
          import os, sys, pathlib
          from huggingface_hub import HfApi, CommitOperationAdd, CommitOperationDelete

          token   = os.environ["HF_TOKEN"]
          user    = os.environ["HF_SPACE_USER"]
          name    = os.environ["HF_SPACE_NAME"]
          sha     = os.environ.get("GITHUB_SHA", "local")[:7]

          api = HfApi(token=token)
          repo_id = f"{user}/{name}"

          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              commit_message=f"Sync from GitHub {sha}",
              ignore_patterns=[
                  ".git/**",
                  ".github/**",
                  ".venv/**",
                  "venv/**",
                  "__pycache__/**",
                  "**/__pycache__/**",
                  "**/*.pyc",
                  ".pytest_cache/**",
                  ".ruff_cache/**",
                  ".mypy_cache/**",
                  "tests/**",
                  "*.log",
                  "hf_app.py",          # local diag artifact from probes
                  "conus.html",
              ],
          )
          print(f"::notice::Mirrored {sha} to {repo_id} via HF REST API")
          PY
