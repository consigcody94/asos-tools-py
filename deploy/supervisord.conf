; O.W.L. — supervisord config for HF Spaces Docker.
;
; Runs three processes inside one container:
;   * nginx      — reverse proxy on port 7860 (the only externally-exposed port)
;   * streamlit  — UI on 127.0.0.1:8501
;   * uvicorn    — FastAPI REST+webhooks on 127.0.0.1:8000
;
; supervisord itself is PID 1; if any child dies, it restarts automatically.
; If a child dies THREE times in 30s the whole container exits (HF then
; restarts it from scratch — the desired failure mode for a crashloop).

[supervisord]
nodaemon=true
user=root
pidfile=/tmp/supervisord.pid
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info

[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

; ============================================================
; nginx — public entrypoint on :7860
; ============================================================
[program:nginx]
command=/usr/sbin/nginx -c /app/deploy/nginx.conf -g "daemon off;"
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

; ============================================================
; Streamlit UI — 127.0.0.1:8501
; ============================================================
[program:streamlit]
command=streamlit run /app/app.py
    --server.port=8501
    --server.address=127.0.0.1
    --server.headless=true
    --server.enableCORS=false
    --server.enableXsrfProtection=false
    --browser.gatherUsageStats=false
directory=/app
autostart=true
autorestart=true
startretries=3
environment=PYTHONUNBUFFERED="1",HOME="/tmp"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20

; ============================================================
; FastAPI — 127.0.0.1:8000
; ============================================================
[program:fastapi]
command=uvicorn asos_tools.api:app
    --host=127.0.0.1
    --port=8000
    --workers=1
    --no-access-log
directory=/app
autostart=true
autorestart=true
startretries=3
environment=PYTHONUNBUFFERED="1",HOME="/tmp"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=30
