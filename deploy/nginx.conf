# O.W.L. — internal reverse proxy inside the HF Spaces Docker container.
#
# HF exposes exactly one port externally (7860). nginx listens on that
# port and multiplexes between:
#
#   /api/*         -> FastAPI (REST, webhooks, tick)
#   everything else -> Streamlit (UI, WebSockets)
#
# All upstreams are on 127.0.0.1 inside the container. nginx runs as the
# non-root "user" (UID 1000) so pid/log/temp paths are redirected under
# /tmp to avoid permission errors on HF's read-only system dirs.

worker_processes auto;
pid /tmp/owl-nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    # Redirect every nginx-owned path to /tmp so non-root can write.
    client_body_temp_path /tmp/nginx/body;
    proxy_temp_path       /tmp/nginx/proxy;
    fastcgi_temp_path     /tmp/nginx/fastcgi;
    uwsgi_temp_path       /tmp/nginx/uwsgi;
    scgi_temp_path        /tmp/nginx/scgi;

    access_log /dev/stdout;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Streamlit sends lots of small websocket frames; let them through.
    proxy_buffering off;
    proxy_request_buffering off;

    # gzip static assets; Streamlit's frontend bundle is ~5 MB uncompressed.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    server {
        listen 7860 default_server;
        server_name _;

        # Reasonable upload cap — largest thing we accept is a custom
        # station list (< 10 KB). Reports are all generated server-side.
        client_max_body_size 2m;

        # ------------------------------------------------------------
        # FastAPI — /api/*
        # ------------------------------------------------------------
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_connect_timeout 10s;
            # /api/tick now uses BackgroundTasks and returns 202 instantly,
            # but other endpoints (e.g. /api/webcams/near with cold cache)
            # may legitimately take longer.  300s is generous + safe.
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
        }

        # ------------------------------------------------------------
        # Streamlit UI — everything else
        # ------------------------------------------------------------
        location / {
            proxy_pass http://127.0.0.1:8501;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            # WebSocket upgrade — Streamlit's interactive frontend needs this.
            proxy_set_header Upgrade            $http_upgrade;
            proxy_set_header Connection         "upgrade";

            proxy_connect_timeout 10s;
            # Long read so long-running scans don't kill the socket.
            proxy_read_timeout    86400s;
            proxy_send_timeout    86400s;
        }
    }
}
