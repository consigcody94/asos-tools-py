# O.W.L. — internal reverse proxy inside the HF Spaces Docker container.
#
# HF exposes exactly one port externally (7860). nginx listens on that
# port and multiplexes between:
#
#   /api/*         -> FastAPI (REST, webhooks, tick)
#   everything else -> Streamlit (UI, WebSockets)
#
# All upstreams are on 127.0.0.1 inside the container. nginx runs as the
# non-root "user" (UID 1000) so pid/log/temp paths are redirected under
# /tmp to avoid permission errors on HF's read-only system dirs.

worker_processes auto;
pid /tmp/owl-nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    # Redirect every nginx-owned path to /tmp so non-root can write.
    client_body_temp_path /tmp/nginx/body;
    proxy_temp_path       /tmp/nginx/proxy;
    fastcgi_temp_path     /tmp/nginx/fastcgi;
    uwsgi_temp_path       /tmp/nginx/uwsgi;
    scgi_temp_path        /tmp/nginx/scgi;

    # Rate-limit zone for the /api/* surface — cron legitimately hits
    # /api/tick every 5 min, so allow a burst + background.  Anyone
    # brute-forcing OWL_CRON_SECRET will be slowed to 20 req/s max.
    limit_req_zone $binary_remote_addr zone=owl_api:10m rate=20r/s;
    limit_req_status 429;

    access_log /dev/stdout;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Streamlit sends lots of small websocket frames; let them through.
    proxy_buffering off;
    proxy_request_buffering off;

    # gzip static assets; Streamlit's frontend bundle is ~5 MB uncompressed.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    server {
        listen 7860 default_server;
        server_name _;

        # Reasonable upload cap — largest thing we accept is a custom
        # station list (< 10 KB). Reports are all generated server-side.
        client_max_body_size 2m;

        # Security headers.  Applied to every response.
        # CSP scoped to the upstreams we actually use:
        #   - images: FAA WeatherCams CDN + NOAA NESDIS + IEM radar tiles
        #   - connect (XHR/WebSocket): the space's own origin + AWC/NWS
        #   - script: Streamlit requires 'unsafe-inline'+'unsafe-eval'
        #   - Globe.gl loads from unpkg.com (pinned versions)
        #   - frame: YouTube for drill-panel "Live Coverage" spotter
        #     cams.  Must be youtube.com + youtube-nocookie.com +
        #     googlevideo.com (CDN that serves the actual video bytes).
        add_header X-Frame-Options              "SAMEORIGIN" always;
        add_header X-Content-Type-Options       "nosniff"    always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy           "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy      "default-src 'self'; img-src 'self' data: https://*.faa.gov https://*.noaa.gov https://*.nesdis.noaa.gov https://*.weather.gov https://*.agron.iastate.edu https://*.ytimg.com https://unpkg.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://www.youtube.com https://s.ytimg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' wss: https://aviationweather.gov https://api.weather.gov https://services.swpc.noaa.gov https://weathercams.faa.gov https://images.wcams-static.faa.gov https://mesonet.agron.iastate.edu https://www.youtube.com https://*.googlevideo.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; child-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; frame-ancestors 'self' https://huggingface.co;" always;

        # ------------------------------------------------------------
        # FastAPI — /api/*
        # ------------------------------------------------------------
        location /api/ {
            # Rate limit: 20 req/s avg, burst 40.  Enough headroom for
            # the UI's /api/webcams/near fanout when a user drills into
            # a station, while bounding any brute-force attempt against
            # /api/tick.
            limit_req zone=owl_api burst=40 nodelay;
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_connect_timeout 10s;
            # /api/tick now uses BackgroundTasks and returns 202 instantly,
            # but other endpoints (e.g. /api/webcams/near with cold cache)
            # may legitimately take longer.  300s is generous + safe.
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
        }

        # ------------------------------------------------------------
        # Streamlit UI — everything else
        # ------------------------------------------------------------
        location / {
            proxy_pass http://127.0.0.1:8501;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            # WebSocket upgrade — Streamlit's interactive frontend needs this.
            proxy_set_header Upgrade            $http_upgrade;
            proxy_set_header Connection         "upgrade";

            proxy_connect_timeout 10s;
            # Long read so long-running scans don't kill the socket.
            proxy_read_timeout    86400s;
            proxy_send_timeout    86400s;
        }
    }
}
